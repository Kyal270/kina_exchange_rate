name: Run BSP Rate Bot

on:
  schedule:
    - cron: '0 */8 * * *'  # ၈ နာရီတစ်ခါ အလိုအလျောက် Run ရန်
  workflow_dispatch:      # Manual Run ခလုတ် ပေါ်စေရန်

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Node.js 24 ကို အတင်းအကျပ် သုံးခိုင်းရန် (Warning ပျောက်စေရန်)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # v3 မှ v4 သို့ ပြောင်းထားပါသည်

    - name: Set up Python
      uses: actions/setup-python@v5  # v4 မှ v5 သို့ ပြောင်းထားပါသည်
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python main.py
