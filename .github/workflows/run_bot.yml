name: Run BSP Rate Bot

on:
  schedule:
    - cron: '0 */8 * * *'  # ၈ နာရီတစ်ခါ အလိုအလျောက် Run ရန်
  workflow_dispatch:      # ကိုယ်တိုင် လက်နဲ့ နှိပ် Run ချင်ရင် သုံးရန်

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python main.py
